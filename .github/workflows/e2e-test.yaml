name: e2e test
run-name: E2E test steps for ${{ github.sha }} on ${{ github.ref_name }}

on:
  workflow_call:

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version: '1.26'

      - name: Install Podman
        uses: redhat-actions/podman-install@389aecfff6b6e2fabd3e6053672d9c6439073562 # main

      - name: Setup podman for rootless (standard GitHub runner user)
        run: systemctl --user enable --now podman.socket

      - name: Run E2E tests
        run: make test-e2e
        env:
          DOCKER_HOST: "unix://$XDG_RUNTIME_DIR/podman/podman.sock"
