name: ci
run-name: CI for ${{ github.sha }} on ${{ github.ref_name }}

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
      - "release-**"
    tags:
      - "v**"
  pull_request:
    branches:
      - "*"

jobs:
  unit-test:
    uses: ./.github/workflows/unittest.yaml
  e2e-test:
    uses: ./.github/workflows/e2e-test.yaml
  build:
    uses: ./.github/workflows/build-and-test-rock.yaml
  gh-publish:
    permissions:
      packages: write
      contents: read
    if: ${{ (github.ref == 'refs/heads/main') || (github.ref_type == 'tag') }}
    needs: [ build, unit-test ]
    uses: canonical/identity-team/.github/workflows/_rock-gh-publish.yaml@5830f3e6723de07cb5b7ccb6c84031d8b2964c62 # v1.11.4
    with:
      rock: "hook-service"
  scan:
    permissions:
      packages: read
      contents: read
      security-events: write
      actions: read
    if: ${{ (github.ref == 'refs/heads/main') || (github.ref_type == 'tag') }}
    needs: gh-publish
    uses: canonical/identity-team/.github/workflows/_rock-scan.yaml@5830f3e6723de07cb5b7ccb6c84031d8b2964c62 # v1.11.4
    with:
      image: ${{ needs.gh-publish.outputs.image }}
