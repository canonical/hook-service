schema: spec-driven

context: |
  hook-service: Go OAuth token hook endpoint integrating Ory Kratos (identity), Ory Hydra (OAuth2/OIDC), OpenFGA (authorization), and Salesforce (optional group provider).

  Tech stack: Go, PostgreSQL (squirrel SQL builder), gRPC/gRPC-gateway, OpenFGA, cobra CLI, OpenTelemetry.

  Packages:
  - pkg/hooks: OAuth token hook handlers (main business logic)
  - pkg/authorization: app-level OpenFGA authorization, gRPC handlers
  - pkg/groups: group CRUD, gRPC handlers
  - internal/authorization: OpenFGA model management
  - internal/openfga: low-level OpenFGA client
  - internal/importer: Salesforce import driver + sync logic
  - internal/storage: PostgreSQL storage layer
  - pkg/web: HTTP router (chi), wires services + middleware
  - cmd/: cobra CLI (serve, import, groups, users, migrate)


rules:
  spec:
    - Every capability spec under openspec/specs/ must include a ## Purpose section before ## Requirements
    - The ## Purpose section is the single source of truth for design rationale (ADR-style); capture intent, goals, non-goals, and key decisions (with brief alternatives) so no separate ADR or design file is needed
    - Keep the ## Purpose human-readable: prose and decisions, not machine-generated task lists or file-path dumps
    - Requirements stay behaviour-driven (SHALL/MUST + #### Scenario blocks); the "why" lives in ## Purpose, the "what" in ## Requirements
  proposal:
    - Keep proposals concise (under 400 words)
    - Always include a Non-goals section
    - Reference affected packages by name
  tasks:
    - Break tasks into single-package units of work
    - Each task must reference the file(s) it touches
    - Always include a task for updating/adding tests
